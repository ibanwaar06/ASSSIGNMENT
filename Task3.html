    <title>Quotes and Citing</title>
</head>
<body>
    <h1></h1>
    <p>
  <blockquote>
"Past and future veil God from our sight; burn up both of them with fire. How long will you be partitioned by these segments, like a reed? So long as a reed is partitioned, it is not privy to secrets, nor is it a companion of lips and breathing.".
  </blockquote>
  </p>
  <hr>
  <p>—  <cite>Rumi, The Masnavi</cite></p>
</body>
